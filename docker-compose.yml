services:
  api:
    build:
      context: .
    container_name: car-reminder-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@car-reminder-postgres:5432/${POSTGRES_DB:-car_reminder}?schema=public}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      PUBLIC_URL: ${PUBLIC_URL:-https://novabytecode.ro/car-reminder}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-at-least-32-characters-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-at-least-32-characters-refresh-secret}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-30}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      REMINDER_CRON: ${REMINDER_CRON:-0 8 * * *}
      REMINDER_CRON_TIMEZONE: ${REMINDER_CRON_TIMEZONE:-Europe/Bucharest}
      TRUST_PROXY: ${TRUST_PROXY:-false}
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - nova-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: car-reminder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-car_reminder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      nova-net:
        aliases:
          - car-reminder-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
networks:
  nova-net:
    external: true
    name: ${DOCKER_NETWORK:-nova-net}
